        <h2>La Copa Libertadores 1986 fue la vigésima séptima edición del torneo de clubes más importante de América del Sur, organizado por la Confederación Sudamericana de Fútbol, en la que participaron equipos de nueve países sudamericanos: Argentina, Bolivia, Brasil, Chile, Colombia, Ecuador, Paraguay, Perú y Uruguay. En esta oportunidad, no participó ningún representante de Venezuela, ya que la federación de aquel país se encontraba suspendida por la FIFA debido a irregularidades en su administración.</h2>

        <h2>FORMATO</h2>
        <h2>El campeón vigente accedió de manera directa a la segunda fase, mientras que los 18 equipos restantes disputaron la primera. En ella, los clubes fueron divididos en cinco grupos, cuatro conformado por 4 equipos y el restante compuesto por solamente 2, distribuidos de acuerdo a sus países de origen, de manera que los dos representantes de una misma asociación nacional debían caer en la misma zona. El ganador de cada uno de los cinco grupos clasificó a la segunda fase, uniéndose al campeón vigente, estableciéndose dos zonas de 3 equipos. El primer posicionado en cada una de ellas accedió a la final, que se llevó a cabo en encuentros de ida y vuelta, disputándose un partido de desempate en caso de ser necesario.</h2>
